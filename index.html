<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mortes - Quinta Serie Ead (LIVE)</title>
  <style>
    body { background: #0d1117; color: #c9d1d9; font-family: Arial, sans-serif; margin: 0; padding: 20px; max-width: 900px; margin: auto; }
    h1 { text-align: center; color: #f85149; margin-bottom: 5px; }
    .live { color: #00ff00; animation: pulse 2s infinite; font-size: 0.6em; vertical-align: middle; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } }
    
    #lastUpdate { text-align: center; font-size: 0.85em; color: #8b949e; margin-bottom: 15px; }
    #status { text-align: center; font-weight: bold; margin: 10px 0; color: #58a6ff; }
    
    input { width: 100%; padding: 12px; margin: 10px 0; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: white; box-sizing: border-box; }
    
    .button-container { text-align: center; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    
    button.filter-btn {
      padding: 10px 15px;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #f0f6fc1a;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    button.filter-btn:hover { background: #30363d; border-color: #8b949e; }
    button.test-btn { color: #3fb950; border-color: #238636; }

    /* Estilo do Contador de Mortes por Dia */
    .day-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid #30363d;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }
    .frag-count { 
      background: #da3633; 
      color: white; 
      padding: 2px 10px; 
      border-radius: 20px; 
      font-size: 0.9em;
      font-weight: bold;
    }

    .day { background: #161b22; padding: 15px; margin: 15px 0; border-radius: 8px; border: 1px solid #30363d; }
    .death { background: #0d1117; padding: 10px; margin: 6px 0; border-radius: 6px; border-left: 3px solid #f85149; font-size: 0.95em; }
    .victim { color: #ff7b72; font-weight: bold; }
    .killer { color: #8b949e; font-style: italic; }
  </style>
</head>
<body>
  <h1>☠️ Quinta Serie Ead <span class="live">● LIVE</span></h1>
  <div id="lastUpdate">Última atualização: agora</div>

  <input type="text" id="search" placeholder="Filtrar por nome ou data (ex: 15/05)..." onkeyup="filterDeaths()">
  
  <div class="button-container">
    <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">Mostrar apenas mortes p/ Players</button>
    <button class="filter-btn test-btn" onclick="testSound()">🔊 Testar Som</button>
  </div>

  <div id="status">Iniciando monitoramento...</div>
  <div id="deathsList"></div>

  <script>
    const deathSound = new Audio('https://www.myinstants.com/media/sounds/comemoracaoooo.mp3'); 
    const GUILD_NAME = "Quinta Serie Ead";
    const GUILD_API = `https://api.tibiadata.com/v4/guild/${encodeURIComponent(GUILD_NAME)}`;
    
    let allDeaths = [];
    let showOnlyPlayerKills = true;
    let lastUpdateTime = Date.now();
    let lastDeathsHash = "";

    function formatDate(dateStr) {
      if (!dateStr) return "??/??/????";
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    function isPlayerKill(reason) {
      if (!reason || !reason.includes(" by ")) return false;
      const afterBy = reason.split(" by ")[1].trim();
      return /^[A-Z]/.test(afterBy);
    }

    function testSound() {
        deathSound.play().catch(e => alert("Clique na página antes para permitir o som!"));
    }

    async function loadDeaths() {
      try {
        const guildRes = await fetch(GUILD_API);
        const guildData = await guildRes.json();
        const members = guildData.guild.members || [];

        let newDeaths = [];

        for (const member of members) {
          const charRes = await fetch(`https://api.tibiadata.com/v4/character/${encodeURIComponent(member.name)}`);
          const charData = await charRes.json();

          if (charData.character && charData.character.deaths) {
            charData.character.deaths.forEach(death => {
              const reason = death.reason || '';
              newDeaths.push({
                date: death.time.split('T')[0],
                formattedDate: formatDate(death.time.split('T')[0]),
                victim: member.name,
                level: death.level,
                reason: reason,
                isPlayer: isPlayerKill(reason)
              });
            });
          }
        }

        newDeaths.sort((a, b) => b.date.localeCompare(a.date));
        const currentHash = JSON.stringify(newDeaths.map(d => d.victim + d.date));

        if (lastDeathsHash !== "" && currentHash !== lastDeathsHash) {
          const newOnes = newDeaths.length - allDeaths.length;
          if (newOnes > 0) {
            deathSound.play().catch(e => console.log("Som bloqueado"));
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("🚨 Nova Morte!", { body: `${newOnes} morte(s) detectada(s)!`, icon: "https://tibia.com/favicon.ico" });
            }
          }
        }

        allDeaths = newDeaths;
        lastDeathsHash = currentHash;
        lastUpdateTime = Date.now();
        renderDeaths(allDeaths);
        document.getElementById('status').textContent = `✅ ${allDeaths.length} registros processados`;

      } catch (e) {
        document.getElementById('status').textContent = 'Erro de conexão...';
      }
    }

    function renderDeaths(deaths) {
      const container = document.getElementById('deathsList');
      container.innerHTML = '';
      
      const filtered = showOnlyPlayerKills ? deaths.filter(d => d.isPlayer) : deaths;

      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#8b949e;">Nenhuma morte registrada.</p>';
        return;
      }

      const grouped = {};
      filtered.forEach(d => {
        if (!grouped[d.date]) grouped[d.date] = [];
        grouped[d.date].push(d);
      });

      Object.keys(grouped).sort().reverse().forEach(rawDate => {
        const formatted = formatDate(rawDate);
        const dailyDeaths = grouped[rawDate];
        
        // Criar seção do dia com o Contador de Frags
        let html = `
          <div class="day">
            <div class="day-header">
              <h3>${formatted}</h3>
              <span class="frag-count">${dailyDeaths.length} MORTES</span>
            </div>`;
        
        dailyDeaths.forEach(d => {
          html += `
            <div class="death">
              <span class="victim">${d.victim}</span> (Lvl ${d.level}) 
              <br><span class="killer">${d.reason}</span>
            </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function filterDeaths() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = allDeaths.filter(d => 
        d.victim.toLowerCase().includes(term) || d.formattedDate.includes(term)
      );
      renderDeaths(filtered);
    }

    function toggleFilter() {
      showOnlyPlayerKills = !showOnlyPlayerKills;
      document.getElementById('filterBtn').textContent = showOnlyPlayerKills 
        ? "Mostrar apenas mortes p/ Players" 
        : "Mostrar todas as mortes";
      renderDeaths(allDeaths);
    }

    function updateCounter() {
      const seconds = Math.floor((Date.now() - lastUpdateTime) / 1000);
      document.getElementById('lastUpdate').textContent = `Sincronizado há ${seconds}s`;
    }

    setInterval(loadDeaths, 60000); 
    setInterval(updateCounter, 1000);
    loadDeaths();

    if ("Notification" in window) { Notification.requestPermission(); }
  </script>
</body>
</html>
