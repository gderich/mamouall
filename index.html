<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mortes - Quinta Serie Ead</title>
  <style>
    body { background: #0d1117; color: #c9d1d9; font-family: Arial; margin: 0; padding: 20px; max-width: 900px; margin: auto; }
    h1 { text-align: center; color: #f85149; }
    #status { text-align: center; font-weight: bold; margin: 20px 0; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #21262d; border: 1px solid #444; border-radius: 6px; color: white; }
    button.filter-btn {
      padding: 12px 20px;
      background: #58a6ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 0;
      font-weight: bold;
    }
    .day { background: #1f2a3a; padding: 15px; margin: 15px 0; border-radius: 8px; border-left: 6px solid #f85149; }
    .death { background: #21262d; padding: 12px; margin: 8px 0; border-radius: 6px; }
    .victim { color: #ff7b72; font-weight: bold; }
    .killer { color: #8b949e; }
    .mode { font-size: 0.9em; color: #58a6ff; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>☠️ Mortes da Guild - Quinta Serie Ead</h1>
  
  <input type="text" id="search" placeholder="Buscar por nome ou data (ex: 15/03/2026)" onkeyup="filterDeaths()">
  
  <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">Mostrar apenas mortes por players</button>
  <div id="mode" class="mode">Modo atual: Apenas mortes por players</div>

  <div id="status">Carregando mortes...</div>
  <div id="deathsList"></div>

  <script>
    const GUILD_NAME = "Quinta Serie Ead";
    const GUILD_API = `https://api.tibiadata.com/v4/guild/${encodeURIComponent(GUILD_NAME)}`;
    let allDeaths = [];
    let showOnlyPlayerKills = true;

    // Lista grande de criaturas e bosses (baseada no TibiaWiki)
    const monsterList = [
      "dragon", "demon", "behemoth", "hydra", "lich", "minotaur", "orc", "troll", "rat", "spider", 
      "skeleton", "cyclops", "giant", "vampire", "ghost", "zombie", "boss", "elder dragon", "wyrm", 
      "ancient scarab", "beast", "wolf", "snake", "crab", "frog", "bear", "lion", "scorpion", 
      "gargoyle", "golem", "imp", "spectre", "wraith", "undead", "elemental", "slime", "blob"
    ];

    function formatDate(dateStr) {
      if (!dateStr) return "??/??/????";
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    function isPlayerKill(reason) {
      if (!reason || !reason.includes("killed by ")) return false;
      
      let killer = reason.split("killed by ")[1].trim().toLowerCase();
      
      // Remove artigos e palavras comuns
      killer = killer.replace(/^a |^an |^the /, '');
      
      // Se for monstro da lista → não é player
      if (monsterList.some(m => killer.includes(m))) return false;
      
      // Se começa com letra maiúscula e tem nome longo → quase sempre é player
      const cleanKiller = reason.split("killed by ")[1].trim();
      return /^[A-Z]/.test(cleanKiller) && cleanKiller.length > 5;
    }

    async function loadDeaths() {
      const status = document.getElementById('status');
      const list = document.getElementById('deathsList');
      list.innerHTML = '';

      try {
        const guildRes = await fetch(GUILD_API);
        const guildData = await guildRes.json();
        const members = guildData.guild.members || [];

        allDeaths = [];

        for (const member of members) {
          const charRes = await fetch(`https://api.tibiadata.com/v4/character/${encodeURIComponent(member.name)}`);
          const charData = await charRes.json();

          if (charData.character && charData.character.deaths) {
            charData.character.deaths.forEach(death => {
              const reason = death.reason || '';
              allDeaths.push({
                date: death.time.split('T')[0],
                formattedDate: formatDate(death.time.split('T')[0]),
                victim: member.name,
                level: death.level,
                reason: reason,
                isPlayer: isPlayerKill(reason)
              });
            });
          }
        }

        allDeaths.sort((a, b) => b.date.localeCompare(a.date));
        renderDeaths(allDeaths);
        status.textContent = `✅ ${allDeaths.length} mortes carregadas`;

      } catch (e) {
        status.textContent = 'Erro ao carregar: ' + e.message;
      }
    }

    function renderDeaths(deaths) {
      const container = document.getElementById('deathsList');
      container.innerHTML = '';

      const filtered = showOnlyPlayerKills 
        ? deaths.filter(d => d.isPlayer) 
        : deaths;

      if (filtered.length === 0) {
        container.innerHTML = showOnlyPlayerKills 
          ? '<p>Nenhuma morte por player encontrada neste período.</p>' 
          : '<p>Nenhuma morte encontrada.</p>';
        return;
      }

      const grouped = {};
      filtered.forEach(d => {
        if (!grouped[d.date]) grouped[d.date] = [];
        grouped[d.date].push(d);
      });

      Object.keys(grouped).sort().reverse().forEach(rawDate => {
        const formatted = formatDate(rawDate);
        let html = `<div class="day"><h3>${formatted}</h3>`;
        
        grouped[rawDate].forEach(d => {
          html += `
            <div class="death">
              <span class="victim">${d.victim}</span> (Lvl ${d.level}) 
              foi morto por: <span class="killer">${d.reason}</span>
            </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function filterDeaths() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = allDeaths.filter(d => 
        d.victim.toLowerCase().includes(term) || 
        d.formattedDate.includes(term) ||
        d.reason.toLowerCase().includes(term)
      );
      renderDeaths(filtered);
    }

    function toggleFilter() {
      showOnlyPlayerKills = !showOnlyPlayerKills;
      const btn = document.getElementById('filterBtn');
      const modeText = document.getElementById('mode');
      
      btn.textContent = showOnlyPlayerKills 
        ? "Mostrar apenas mortes por players" 
        : "Mostrar todas as mortes";
      
      modeText.textContent = showOnlyPlayerKills 
        ? "Modo atual: Apenas mortes por players" 
        : "Modo atual: Todas as mortes";
      
      renderDeaths(allDeaths);
    }

    // Primeira carga
    loadDeaths();

    // Atualiza a cada 5 minutos
    setInterval(loadDeaths, 300000);
  </script>
</body>
</html>
