<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mortes - Quinta Serie Ead</title>
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { text-align: center; color: #f85149; }
    #status { text-align: center; font-weight: bold; margin: 20px 0; }
    ul { list-style: none; padding: 0; }
    li {
      background: #21262d;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .info { flex: 1; }
    .btn {
      background: #f85149;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:hover { background: #e63939; }
  </style>
</head>
<body>
  <h1>☠️ Mortes da Guild - Quinta Serie Ead</h1>
  <div id="status">Carregando membros...</div>
  <ul id="list"></ul>

  <script>
    const API_URL = "https://api.tibiadata.com/v4/guild/Quinta%20Serie%20Ead";

    async function carregar() {
      const status = document.getElementById('status');
      const list = document.getElementById('list');
      list.innerHTML = '';

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (data.error || !data.guild) {
          status.textContent = "❌ Guild não encontrada";
          return;
        }

        const members = data.guild.members || [];
        status.textContent = `✅ ${members.length} membros carregados`;

        members.forEach(m => {
          const li = document.createElement('li');
          li.innerHTML = `
            <div class="info">
              <strong>${m.name}</strong><br>
              Level ${m.level} • ${m.vocation}
            </div>
            <a href="https://www.tibia.com/community/?subtopic=characters&name=${encodeURIComponent(m.name)}" 
               target="_blank" class="btn">Ver Mortes</a>
          `;
          list.appendChild(li);
        });

      } catch (e) {
        status.textContent = "Erro ao carregar guild";
      }
    }

    carregar();
    setInterval(carregar, 300000); // atualiza a cada 5 minutos
  </script>
</body>
</html>
