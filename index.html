<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tibia Guild Deaths - Quinta Serie Ead</title>
  <style>
    :root {
      --bg: #0d1117;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --red: #f85149;
      --gray: #30363d;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { text-align: center; color: var(--red); margin-bottom: 10px; }
    #status {
      text-align: center;
      font-weight: bold;
      margin: 15px 0;
      min-height: 24px;
    }
    #status.error { color: #f85149; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      background: var(--gray);
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
    }
    .big-link {
      display: block;
      width: 100%;
      padding: 18px;
      background: #f85149;
      color: white;
      text-align: center;
      font-size: 1.3em;
      font-weight: bold;
      border-radius: 8px;
      margin: 20px 0;
      text-decoration: none;
    }
    .big-link:hover {
      background: #e63939;
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <h1>☠️ Mortes da Guild - Quinta Serie Ead</h1>

  <div id="status">Carregando membros da guild...</div>

  <ul id="membersList"></ul>

  <!-- Link grande e direto para o GuildStats (melhor fonte de mortes) -->
  <a href="https://guildstats.eu/guild=Quinta+Serie+Ead&op=2" target="_blank" class="big-link">
    📊 VER TODAS AS MORTES DA GUILD (com data e quem matou)
  </a>

  <p style="text-align:center; color:#888; font-size:0.9em;">
    GuildStats.eu é a fonte mais completa e atualizada de mortes.<br>
    O link acima mostra todas as mortes recentes da guild com data, vítima e killer.
  </p>

  <script>
    const API = "https://api.tibiadata.com/v4/guild/Quinta%20Serie%20Ead";

    async function loadGuild() {
      const status = document.getElementById('status');
      const list = document.getElementById('membersList');

      try {
        const res = await fetch(API);
        const data = await res.json();

        if (data.error || !data.guild) {
          status.textContent = 'Guild não encontrada.';
          return;
        }

        const members = data.guild.members || [];
        status.textContent = `Guild encontrada! ${members.length} membros.`;

        list.innerHTML = '';
        members.forEach(m => {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${m.name}</strong> (Lvl ${m.level} - ${m.vocation})`;
          list.appendChild(li);
        });

      } catch (e) {
        status.classList.add('error');
        status.textContent = 'Erro ao carregar: ' + e.message;
      }
    }

    loadGuild();
  </script>
</body>
</html>
