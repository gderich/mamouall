<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mortes - Quinta Serie Ead (LIVE)</title>
  <style>
    body { background: #0d1117; color: #c9d1d9; font-family: Arial; margin: 0; padding: 20px; max-width: 900px; margin: auto; }
    h1 { text-align: center; color: #f85149; }
    .live { color: #00ff00; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } }
    #lastUpdate { text-align: center; font-size: 0.95em; color: #888; margin-bottom: 10px; }
    #status { text-align: center; font-weight: bold; margin: 10px 0; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #21262d; border: 1px solid #444; border-radius: 6px; color: white; }
    button.filter-btn {
      padding: 12px 20px;
      background: #58a6ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 0;
      font-weight: bold;
    }
    .day { background: #1f2a3a; padding: 15px; margin: 15px 0; border-radius: 8px; border-left: 6px solid #f85149; }
    .death { background: #21262d; padding: 12px; margin: 8px 0; border-radius: 6px; }
    .death.new { animation: highlight 6s; background: #3a2a1f; }
    @keyframes highlight { 0% { background: #3a2a1f; } 100% { background: #21262d; } }
    .victim { color: #ff7b72; font-weight: bold; }
    .killer { color: #8b949e; }
  </style>
</head>
<body>
  <h1>☠️ Mortes da Guild - Quinta Serie Ead <span class="live">● LIVE</span></h1>
  
  <div id="lastUpdate">Última atualização: agora</div>
  <input type="text" id="search" placeholder="Buscar por nome ou data" onkeyup="filterDeaths()">
  
  <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">Mostrar apenas mortes por players</button>

  <div id="status">Carregando...</div>
  <div id="deathsList"></div>

  <script>
    const GUILD_NAME = "Quinta Serie Ead";
    const GUILD_API = `https://api.tibiadata.com/v4/guild/${encodeURIComponent(GUILD_NAME)}`;
    let allDeaths = [];
    let showOnlyPlayerKills = true;
    let lastUpdateTime = Date.now();
    let lastDeathsHash = "";

    function formatDate(dateStr) {
      if (!dateStr) return "??/??/????";
      const [year, month, day] = dateStr.split('-');
      return `${day}/${month}/${year}`;
    }

    function isPlayerKill(reason) {
      if (!reason || !reason.includes(" by ")) return false;
      const afterBy = reason.split(" by ")[1].trim();
      return /^[A-Z]/.test(afterBy);
    }

    async function loadDeaths() {
      try {
        const guildRes = await fetch(GUILD_API);
        const guildData = await guildRes.json();
        const members = guildData.guild.members || [];

        let newDeaths = [];

        for (const member of members) {
          const charRes = await fetch(`https://api.tibiadata.com/v4/character/${encodeURIComponent(member.name)}`);
          const charData = await charRes.json();

          if (charData.character && charData.character.deaths) {
            charData.character.deaths.forEach(death => {
              const reason = death.reason || '';
              newDeaths.push({
                date: death.time.split('T')[0],
                formattedDate: formatDate(death.time.split('T')[0]),
                victim: member.name,
                level: death.level,
                reason: reason,
                isPlayer: isPlayerKill(reason)
              });
            });
          }
        }

        newDeaths.sort((a, b) => b.date.localeCompare(a.date));

        const currentHash = JSON.stringify(newDeaths.map(d => d.victim + d.date));

        // Se houver morte nova → notificação
        if (currentHash !== lastDeathsHash && lastDeathsHash !== "") {
          const newOnes = newDeaths.length - allDeaths.length;
          if (newOnes > 0 && "Notification" in window && Notification.permission === "granted") {
            new Notification("Nova Morte na Guild!", {
              body: `${newOnes} nova(s) morte(s) detectada(s)!`,
              icon: "https://tibia.com/favicon.ico"
            });
          }
        }

        allDeaths = newDeaths;
        lastDeathsHash = currentHash;
        lastUpdateTime = Date.now();

        renderDeaths(allDeaths);
        document.getElementById('status').textContent = `✅ ${allDeaths.length} mortes carregadas`;

      } catch (e) {
        document.getElementById('status').textContent = 'Erro temporário...';
      }
    }

    function renderDeaths(deaths) {
      const container = document.getElementById('deathsList');
      container.innerHTML = '';

      const filtered = showOnlyPlayerKills ? deaths.filter(d => d.isPlayer) : deaths;

      if (filtered.length === 0) {
        container.innerHTML = '<p>Nenhuma morte encontrada.</p>';
        return;
      }

      const grouped = {};
      filtered.forEach(d => {
        if (!grouped[d.date]) grouped[d.date] = [];
        grouped[d.date].push(d);
      });

      Object.keys(grouped).sort().reverse().forEach(rawDate => {
        const formatted = formatDate(rawDate);
        let html = `<div class="day"><h3>${formatted}</h3>`;
        grouped[rawDate].forEach(d => {
          html += `
            <div class="death">
              <span class="victim">${d.victim}</span> (Lvl ${d.level}) 
              foi morto por: <span class="killer">${d.reason}</span>
            </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function filterDeaths() {
      const term = document.getElementById('search').value.toLowerCase();
      const filtered = allDeaths.filter(d => 
        d.victim.toLowerCase().includes(term) || d.formattedDate.includes(term)
      );
      renderDeaths(filtered);
    }

    function toggleFilter() {
      showOnlyPlayerKills = !showOnlyPlayerKills;
      document.getElementById('filterBtn').textContent = showOnlyPlayerKills 
        ? "Mostrar apenas mortes por players" 
        : "Mostrar todas as mortes";
      renderDeaths(allDeaths);
    }

    function updateCounter() {
      const seconds = Math.floor((Date.now() - lastUpdateTime) / 1000);
      document.getElementById('lastUpdate').textContent = `Última atualização: há ${seconds} segundos`;
    }

    // Atualização ultra-rápida (10 segundos)
    setInterval(loadDeaths, 10000);

    // Contador ao vivo (atualiza a cada segundo)
    setInterval(updateCounter, 1000);

    // Primeira carga
    loadDeaths();
  </script>
</body>
</html>
