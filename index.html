<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mortes - Quinta Serie Ead</title>
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #f85149;
      margin-bottom: 5px;
    }
    .subtitle {
      text-align: center;
      color: #8b949e;
      margin-bottom: 30px;
    }
    #status {
      text-align: center;
      font-weight: bold;
      margin: 20px 0;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #21262d;
      padding: 14px;
      margin: 8px 0;
      border-radius: 8px;
      border-left: 5px solid #58a6ff;
    }
    .big-button {
      display: block;
      width: 100%;
      padding: 20px;
      background: #f85149;
      color: white;
      text-align: center;
      font-size: 1.4em;
      font-weight: bold;
      border-radius: 12px;
      margin: 30px 0;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(248, 81, 73, 0.4);
    }
    .big-button:hover {
      background: #e63939;
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <h1>☠️ Mortes da Guild</h1>
  <p class="subtitle">Quinta Serie Ead</p>

  <div id="status">Carregando membros da guild...</div>

  <ul id="membersList"></ul>

  <a href="https://guildstats.eu/guild=Quinta+Serie+Ead&op=2" target="_blank" class="big-button">
    📊 VER TODAS AS MORTES DA GUILD<br>
    <small>(com data, vítima e quem matou)</small>
  </a>

  <p style="text-align:center; color:#888; font-size:0.9em;">
    As mortes são atualizadas no GuildStats.eu (melhor fonte disponível).<br>
    Clique no botão vermelho acima para ver o histórico completo.
  </p>

  <script>
    const API_URL = "https://api.tibiadata.com/v4/guild/Quinta%20Serie%20Ead";

    async function carregarGuild() {
      const status = document.getElementById('status');
      const lista = document.getElementById('membersList');

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (data.error || !data.guild) {
          status.textContent = "❌ Guild não encontrada";
          return;
        }

        const members = data.guild.members || [];
        status.textContent = `✅ Guild carregada - ${members.length} membros`;

        lista.innerHTML = "";
        members.forEach(m => {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${m.name}</strong> — Level ${m.level} • ${m.vocation}`;
          lista.appendChild(li);
        });

      } catch (err) {
        status.innerHTML = `❌ Erro ao carregar: ${err.message}`;
      }
    }

    // Carrega automaticamente
    carregarGuild();

    // Atualiza a cada 3 minutos
    setInterval(carregarGuild, 180000);
  </script>
</body>
</html>
